name: Fetch NewsData Top News Every 1 hour

on:
  schedule:
    - cron: '0 * * * *'   # Run every 1 hour (UTC)
  workflow_dispatch:          # Allow manual trigger

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Fetch and clean news from NewsData.io
        run: |
          python - <<'PY'
          import json, subprocess
          from pathlib import Path

          root = Path('.')
          api_key = '${{ secrets.NEWSDATA_API_KEY }}'

          def fetch_page(url):
              result = subprocess.run(['curl', '-s', url], capture_output=True, text=True)
              if result.returncode != 0:
                  raise Exception("Failed to fetch news")
              return json.loads(result.stdout)

          # Start with first page
          url = f"https://newsdata.io/api/1/latest?apikey={api_key}&language=en&size=10"
          data = fetch_page(url)

          all_results = data.get('results', [])
          next_page = data.get('nextPage')

          # Fetch 2 more pages (≈30 articles total)
          for _ in range(2):
              if next_page:
                  url = f"https://newsdata.io/api/1/latest?apikey={api_key}&language=en&page={next_page}&size=10"
                  page_data = fetch_page(url)
                  all_results.extend(page_data.get('results', []))
                  next_page = page_data.get('nextPage')

          # Deduplicate by article_id, link, or title to avoid the same story appearing from multiple sources
          seen_ids = set()
          seen_links = set()
          seen_titles = set()
          unique_results = []

          def normalize_text(value):
              return (value or '').strip().lower()

          for item in all_results:
              aid = item.get('article_id')
              title = normalize_text(item.get('title'))
              link = (item.get('link') or '').strip()
              link_key = link.lower() if link else ''

              if aid and aid in seen_ids:
                  continue
              if link_key and link_key in seen_links:
                  continue
              if title and title in seen_titles:
                  continue

              if aid:
                  seen_ids.add(aid)
              if link_key:
                  seen_links.add(link_key)
              if title:
                  seen_titles.add(title)

              # Clean fields
              cleaned = {
                  'title': item.get('title'),
                  'description': item.get('description'),
                  'link': item.get('link'),
                  'source': item.get('source_name'),
                  'image': item.get('image_url'),
                  'published': item.get('pubDate'),
                  'category': item.get('category'),
                  'country': item.get('country')
              }
              unique_results.append(cleaned)

          # Keep only latest 30
          unique_results = unique_results[:30]

          # Save master file
          news_data = {
              'status': data.get('status'),
              'totalResults': len(unique_results),
              'results': unique_results
          }
          (root / 'news.json').write_text(json.dumps(news_data, indent=2), encoding='utf-8')

          # Split into categories
          categories = ['business','entertainment','general','health','science','sports','technology','politics','automobile','top']
          (root / 'news_all.json').write_text(json.dumps(news_data, indent=2), encoding='utf-8')

          for cat in categories:
              filtered = [item for item in unique_results if (isinstance(item.get('category'), list) and cat in item.get('category')) or item.get('category') == cat]
              out = {'status': data.get('status'), 'totalResults': len(filtered), 'results': filtered}
              (root / f'news_{cat}.json').write_text(json.dumps(out, indent=2), encoding='utf-8')

          # National (India only)
          national_results = [item for item in unique_results if item.get('country') == ['india']]
          national_data = {'status': data.get('status'), 'totalResults': len(national_results), 'results': national_results}
          (root / 'news_national.json').write_text(json.dumps(national_data, indent=2), encoding='utf-8')
          PY

      - name: Configure git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Commit and push generated JSON files
        run: |
          git add news*.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update news files - $(date -u +'%Y-%m-%d %H:%M:%S') UTC" && git push)
