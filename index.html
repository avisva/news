<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>News — Single File</title>
    <meta name="description" content="Single-file News SPA using NewsAPI" />
    <style>
      :root{--bg:#f6f7fb;--card:#fff;--accent:#0b5fff;--muted:#6b6b6b}
      *{box-sizing:border-box}
      body{font-family:Inter,Segoe UI,Roboto,Arial,sans-serif;margin:0;background:var(--bg);color:#111}
      .topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.06)}
      .topbar h1{margin:0;font-size:1.25rem}
      .controls{display:flex;gap:8px;align-items:center}
      input#search{padding:8px 10px;border:1px solid #ddd;border-radius:6px;min-width:180px}
      select{padding:8px;border:1px solid #ddd;border-radius:6px}
      select:disabled{background:#f5f5f5;color:#999;cursor:not-allowed}
      button{background:var(--accent);color:#fff;border:none;padding:8px 12px;border-radius:6px;cursor:pointer}
      main{max-width:980px;margin:20px auto;padding:0 16px}
      .status{margin-bottom:12px;color:var(--muted)}
      .articles{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px}
      .card{background:var(--card);border-radius:8px;overflow:hidden;box-shadow:0 1px 4px rgba(15,15,15,.06);display:flex;flex-direction:column}
      .thumb{height:160px;object-fit:cover;width:100%}
      .card-body{padding:12px;flex:1;display:flex;flex-direction:column}
      .meta{font-size:.85rem;color:var(--muted);margin-bottom:6px}
      .title{font-weight:600;margin:0 0 8px}
      .desc{flex:1;color:#333}
      .source{font-size:.8rem;color:var(--muted);margin-top:8px}
      .pagination{display:flex;gap:10px;align-items:center;justify-content:center;margin:18px 0}
      .foot{text-align:center;padding:18px;color:var(--muted)}
      @media (max-width:480px){.controls{flex-direction:column;align-items:stretch}input#search{width:100%} select{width:100%}}
      .notice{background:#fff3cd;border:1px solid #ffeeba;color:#856404;padding:10px;border-radius:6px;margin-bottom:12px;overflow:hidden;position:relative}
      .notice-text{display:inline-block;white-space:nowrap;animation:marquee 30s linear infinite}
      @keyframes marquee{0%{transform:translateX(100%)}100%{transform:translateX(-100%)}}
    </style>
  </head>
  <body>
    <header class="topbar">
      <h1>News</h1>
      <div class="controls">
        <select id="region">
          <option value="global">Global</option>
          <option value="national">National</option>
        </select>
        
        <input id="search" placeholder="Search news..." />
        <select id="category">
          <option value="">All categories</option>
          <option value="business">Business</option>
          <option value="entertainment">Entertainment</option>
          <option value="general">General</option>
          <option value="health">Health</option>
          <option value="science">Science</option>
          <option value="sports">Sports</option>
          <option value="technology">Technology</option>
          <option value="politics">Politics</option>
          <option value="automobile">Automobile</option>
          <option value="top">Top</option>
        </select>
        <button id="searchBtn">Go</button>
      </div>
    </header>

    <main>
      <div class="notice"><span class="notice-text">Top latest trending 10 news at the moment from global and national headlines, technology, automobile, politics, geopolitics, health, business, sports and more — always fresh and easy to browse.</span></div>
      <div id="status" class="status"></div>
      <div id="articles" class="articles"></div>
      <div class="pagination">
        <button id="prev">Previous</button>
        <span id="pageInfo"></span>
        <button id="next">Next</button>
      </div>
    </main>

    <footer style="text-align:center; font-size:12px; color:#666; margin-top:20px;">
      © 2026 news.enviz.in | powered by <a href="https://enviz.in" target="_blank">enviz.in</a> | source   
      <a href="https://newsdata.io" target="_blank">newsdata.io</a> | news refreshed every 15 minutes 
    </footer>

    <script>
      const statusEl = document.getElementById('status');
      const articlesEl = document.getElementById('articles');
      const searchEl = document.getElementById('search');
      const categoryEl = document.getElementById('category');
      const regionEl = document.getElementById('region');
      const searchBtn = document.getElementById('searchBtn');
      const prevBtn = document.getElementById('prev');
      const nextBtn = document.getElementById('next');
      const pageInfo = document.getElementById('pageInfo');

      let page = 1;
      const pageSize = 9;
      let totalResults = 0;
      let cachedItems = [];
      const isLocalFile = location.protocol === 'file:';

      // Filter articles by search and category
      function filterArticles(items, searchTerm, category) {
        return items.filter(item => {
          const matchesSearch = !searchTerm || 
            item.title.toLowerCase().includes(searchTerm.toLowerCase()) ||
            item.description.toLowerCase().includes(searchTerm.toLowerCase());
          
          const matchesCategory = !category || 
            (item.category && (
              (Array.isArray(item.category) && item.category.includes(category)) ||
              item.category === category
            ));
          
          return matchesSearch && matchesCategory;
        });
      }

      async function fetchNews() {
        if (isLocalFile) {
          throw new Error('Page is loaded using file:// protocol. Start a local server and open via http://localhost:8000/.');
        }

        const q = searchEl.value.trim();
        const category = categoryEl.value;
        const region = regionEl.value;
        const fileName = region === 'national' ? 'news_national.json' : 'news_all.json';
        statusEl.textContent = `Loading ${region === 'national' ? 'national' : 'global'} news…`;
        articlesEl.innerHTML = '';
        try {
          // Load region-specific JSON
          let res = await fetch(fileName);
          if (!res.ok) {
            res = await fetch('news_all.json');
            if (!res.ok) {
              throw new Error(`Failed to load ${fileName} and fallback news_all.json: ${res.status}`);
            }
          }
          const data = await res.json();
          const items = data.results || [];
          
          const mapped = items.map(it => {
            return {
              title: it.title || '', 
              url: it.link || '',
              publishedAt: it.pubDate || it.published_date || '',
              description: it.description || it.content || '',
              urlToImage: it.image_url || it.image || '',
              source: { name: it.source_id || it.source_name || '' },
              category: Array.isArray(it.category) ? it.category : (it.category ? [it.category] : [])
            };
          });

          // Apply filters
          let searchTerm = q;
          const filtered = filterArticles(mapped, searchTerm, category);
          cachedItems = filtered;
          totalResults = filtered.length;
          page = 1; // Reset to page 1 after filtering
          renderPage();
          statusEl.textContent = '';
        } catch (err) {
          console.error('Error loading news:', err);
          statusEl.textContent = 'Error: ' + (err.message || err) + '. Check console for details.';
        }
      }

      function renderPage() {
        const start = (page - 1) * pageSize;
        const pageItems = cachedItems.slice(start, start + pageSize);
        pageInfo.textContent = `Page ${page} — ${totalResults} results`;
        renderArticles(pageItems);
      }

      function renderArticles(list) {
        if (!list.length) {
          articlesEl.innerHTML = '<p>No articles found.</p>';
          return;
        }
        articlesEl.innerHTML = '';
        for (const a of list) {
          const card = document.createElement('article');
          card.className = 'card';
          const img = document.createElement('img');
          img.className = 'thumb';
          img.src = a.urlToImage || 'https://via.placeholder.com/600x360?text=No+Image';
          img.alt = a.title || '';
          const body = document.createElement('div');
          body.className = 'card-body';
          const meta = document.createElement('div');
          meta.className = 'meta';
          meta.textContent = a.publishedAt ? new Date(a.publishedAt).toLocaleString() : '';
          const title = document.createElement('h3');
          title.className = 'title';
          const link = document.createElement('a');
          link.href = a.url;
          link.target = '_blank';
          link.rel = 'noopener noreferrer';
          link.textContent = a.title || 'Untitled';
          title.appendChild(link);
          const desc = document.createElement('p');
          desc.className = 'desc';
          desc.textContent = a.description || '';
          const src = document.createElement('div');
          src.className = 'source';
          src.textContent = a.source && a.source.name ? a.source.name : '';
          body.appendChild(meta);
          body.appendChild(title);
          body.appendChild(desc);
          body.appendChild(src);
          card.appendChild(img);
          card.appendChild(body);
          articlesEl.appendChild(card);
        }
      }

      searchBtn.addEventListener('click', () => { page = 1; fetchNews(); });
      searchEl.addEventListener('keydown', (e) => { if (e.key === 'Enter') { page = 1; fetchNews(); } });
      prevBtn.addEventListener('click', () => { if (page > 1) { page--; renderPage(); }});
      nextBtn.addEventListener('click', () => { if (page * pageSize < totalResults) { page++; renderPage(); }});

      // Initial load
      if (isLocalFile) {
        statusEl.textContent = 'Error: file:// pages are blocked from fetching local JSON. Start a local server and open via http://localhost:8000/.';
      } else {
        fetchNews();
      }
    </script>
  </body>
</html>
