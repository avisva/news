<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enviz News</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      margin: 0;
      padding: 20px;
    }
    h1 {
      text-align: center;
      margin-bottom: 20px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }
    .card {
      background: #fff;
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
    }
    .card img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      border-radius: 6px;
      margin-bottom: 10px;
    }
    .card h3 {
      margin: 0 0 10px;
      font-size: 18px;
    }
    .card p {
      font-size: 14px;
      color: #555;
      flex-grow: 1;
    }
    .card .source {
      font-size: 12px;
      color: #888;
      margin-top: 10px;
    }
    .card a {
      display: inline-block;
      margin-top: 10px;
      color: #007BFF;
      text-decoration: none;
    }
    .card a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h1>Latest Headlines</h1>
  <div id="news-container" class="grid"></div>

  <script>
    const apiKey = "YOUR_NEWSDATA_API_KEY"; // replace with your key
    const url = `https://newsdata.io/api/1/news?apikey=pub_a6a939b54a7444d3af9bdce45cb1646e&country=in&language=en`;

    fetch(url)
      .then(response => response.json())
      .then(data => {
        const container = document.getElementById("news-container");
        data.results.forEach(article => {
          const card = document.createElement("div");
          card.className = "card";
          card.innerHTML = `
            ${article.image_url ? `<img src="${article.image_url}" alt="News image">` : ""}
            <h3>${article.title}</h3>
            <p>${article.description || ""}</p>
            <p class="source">Source: ${article.source_name}</p>
            <a href="${article.link}" target="_blank">Read more</a>
          `;
          container.appendChild(card);
        });
      })
      .catch(error => console.error("Error fetching news:", error));
  </script>
</body>
</html>
